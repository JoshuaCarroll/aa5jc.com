<!DOCTYPE html>
<html>
<head>
    <title></title>
    <script type="text/javascript" src="lcarssdk/js/jquery.js"></script>
    <script type="text/javascript" src="/versionCheck.js"></script>

    <!-- Leaflet -->
    <link rel="stylesheet" href="https://unpkg.com/leaflet/dist/leaflet.css" />
    <script src="https://unpkg.com/leaflet/dist/leaflet.js"></script>

    <!-- Leaflet MarkerCluster -->
    <link rel="stylesheet" href="https://unpkg.com/leaflet.markercluster/dist/MarkerCluster.css" />
    <link rel="stylesheet" href="https://unpkg.com/leaflet.markercluster/dist/MarkerCluster.Default.css" />
    <script src="https://unpkg.com/leaflet.markercluster/dist/leaflet.markercluster.js"></script>

    <!-- Maplibre GL -->
    <link href="https://unpkg.com/maplibre-gl/dist/maplibre-gl.css" rel="stylesheet" />
    <script src="https://unpkg.com/maplibre-gl/dist/maplibre-gl.js"></script>

    <!-- Maplibre GL Leaflet  -->
    <script src="https://unpkg.com/@maplibre/maplibre-gl-leaflet/leaflet-maplibre-gl.js"></script>

    <link rel="stylesheet" href="/connections.css" />

</head>
<body>
    <div id="statusBar">
        
    </div>
    <div id="map"></div>
    <div id="controls">
        <input type="checkbox" id="chkZoomToTransmitter" checked="checked" />
        <label for="chkZoomToTransmitter">Zoom to transmitter</label>
    </div>
    <div id="divConnections">
        <table>
            <thead>
                <tr>
                    <th>Node</th>
                    <th>Callsign</th>
                    <th>Description</th>
                </tr>
            </thead>
            <tbody id="tbodyConnections">
                <!-- Connection rows will be populated here -->
            </tbody>
        </table>
    </div>
    <script src="/connections.js"></script>
</body>
</html>
