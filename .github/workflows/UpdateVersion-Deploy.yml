name: Update version and deploy

on:
  push:
    branches: [dev]

  # Allows you to run this workflow manually from the Actions tab
  workflow_dispatch:

# Sets permissions of the GITHUB_TOKEN to allow deployment to GitHub Pages
permissions:
  contents: write
  pages: write
  id-token: write

# Allow only one concurrent deployment, skipping runs queued between the run in-progress and latest queued.
# However, do NOT cancel in-progress runs as we want to allow these production deployments to complete.
concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  sync-and-deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout main branch
        uses: actions/checkout@v4
        with:
          ref: main
          fetch-depth: 0
          token: ${{ secrets.GH_PAT }}

      - name: Sync dev into main
        run: |
          git fetch origin dev main
          git config user.name "GitHub Actions"
          git config user.email "actions@github.com"
          git merge --no-edit origin/dev || {
            echo "Merge from dev into main failed."
            exit 1
          }

      - name: Update version.json
        run: |
          commit_msg="$(git log -1 --pretty=%s)"
          echo "{\"version\":\"$(date +%s)\", \"message\":\"$commit_msg\"}" > version.json

      - name: Commit and push main
        run: |
          git add version.json
          git commit -m "Update version.json" || echo "No changes to commit"
          git push origin HEAD:main

      - name: Setup Pages
        uses: actions/configure-pages@v6

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v5
        with:
          # Upload entire repository
          path: '.'

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v5